name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run -w @utility-watch/core typecheck
      - name: Unit tests
        run: npm test
      - name: Plugin fixture tests
        run: npm run test:plugin --workspaces --if-present
      - name: Validate registry + manifests are JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('registry/providers.json','utf8'))"
          for f in plugins/*/plugin.json; do node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"; done
      - name: No prohibited private terms
        env:
          PRIVATE_TERMS: ${{ secrets.PRIVATE_TERMS }}
        run: |
          # Term list lives in the PRIVATE_TERMS repo secret (pipe-separated),
          # so this guard never spells client/internal names in the public repo.
          if [ -z "$PRIVATE_TERMS" ]; then
            echo "PRIVATE_TERMS secret not set; skipping private-term scan"; exit 0
          fi
          ! grep -rinwE "$PRIVATE_TERMS" \
            --include='*.ts' --include='*.json' --include='*.md' --include='*.txt' \
            --exclude-dir=node_modules .
